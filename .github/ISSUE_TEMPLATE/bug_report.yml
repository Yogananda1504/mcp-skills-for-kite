name: Bug report
description: Report a problem with the skills library or publishing workflow.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve the repository. Please include enough detail to reproduce the issue."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is going wrong?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: 1. ...\n2. ...\n3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or file paths if helpful.