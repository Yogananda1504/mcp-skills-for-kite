name: Publish Skills

on:
  push:
    branches: [ "main" ]
    paths:
      - "skills/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish Skills
        shell: bash
        run: |
          namespace="${{ env.NAMESPACE }}"
          namespace="${namespace,,}"

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            echo "Publishing $skill_name..."
            docker run --rm \
              -e REGISTRY=${{ env.REGISTRY }} \
              -e NAMESPACE=$namespace \
              -e INPUT_REPOSITORY=${{ github.event.repository.name }} \
              -e INPUT_REGISTRY=${{ env.REGISTRY }} \
              -e INPUT_USERNAME=${{ github.actor }} \
              -e INPUT_PASSWORD=${{ secrets.GITHUB_TOKEN }} \
              -e INPUT_NAMESPACE=$namespace \
              -e INPUT_PATH=skills/$skill_name \
              -v "/var/run/docker.sock":"/var/run/docker.sock" \
              -v "${{ github.workspace }}":/github/workspace \
              -w /github/workspace \
              ghcr.io/andrewhowdencom/skr:latest \
              skr batch publish skills --registry ${{ env.REGISTRY }} --namespace $namespace --repository ${{ github.event.repository.name }} --path skills/$skill_name
          done
