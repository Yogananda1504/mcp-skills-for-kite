name: Publish MCP Plugin

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Prepare plugin bundle
        run: |
          rm -rf plugin-bundle/skills || true
          mkdir -p plugin-bundle/skills
          cp -r skills/* plugin-bundle/skills/ || true

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push plugin image
        uses: docker/build-push-action@v4
        with:
          context: ./plugin-bundle
          push: true
          tags: |
            ghcr.io/Yogananda1504/mcp-skills-plugin:latest
            ghcr.io/Yogananda1504/mcp-skills-plugin:${{ github.sha }}

      - name: Output published location
        run: echo "Published to ghcr.io/Yogananda1504/mcp-skills-plugin:latest"
